<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="login-container">

    <div class="login-card">

        <div class="text-center mb-4">
            <img src="forge-logo-wht.png" width="100">
            <h2 class="mt-3 text-white">Forge Report System</h2>
        </div>

        <form id="loginForm">

            <div class="mb-3">
                <input type="email" class="form-control form-control-lg" placeholder="Email">
            </div>

            <div class="mb-3">
                <input type="password" class="form-control form-control-lg" placeholder="Password">
            </div>

            <button class="btn btn-warning w-100 fw-bold mb-3">
                Login
            </button>

            <p class="text-center text-white">
                Don't have an account?
                <a href="signup.html" class="text-warning">Sign Up</a>
            </p>

        </form>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
