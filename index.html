<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Forge Academy Report System</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome-->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
  <!--Forge Icon-->
  <link rel="icon" type="image/png" href="forge-logo-wht.png">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark custom-navbar px-4">
  <section class="hero-section text-white">

    <div class="container-fluid">

        <div class="row align-items-center">

            <div class="col-lg-6">

                <h1 class="display-2 fw-bold">
                    Forge Report System
                </h1>

                <div class="orange-line mb-4"></div>

                <p class="lead">
                    Report internal workflows across departments.
                </p>

            </div>

            <div class="col-lg-6 text-lg-end mt-4 mt-lg-0">

                <div class="d-flex align-items-center justify-content-lg-end">

                    <img src="forge-logo-wht.png"
                         width="120"
                         class="me-3">
                         <a href="login.html"><button class="btn btn-warning fw-semibold">
        Logout
      </button></a>

                </div>

            </div>

        </div>

    </div>

</section>
  </nav>

  <div class="container-fluid">
    <div class="row">

      <!-- Sidebar -->
      <div class="col-lg-2 sidebar p-4">
        <button class="nav-btn active-btn"><i class="fa-solid fa-house me-2"></i>Dashboard</button>

        <button class="nav-btn"><i class="fa-sharp fa-solid fa-circle-plus me-2"></i>Create Report</button>
        <button class="nav-btn">
        <i class="fa-solid fa-file-circle-plus me-2"></i>
        Submit Report
        </button>
        <button class="nav-btn">
        <i class="fa-solid fa-folder-open me-2"></i>
        My Reports
        </button>
        <button class="nav-btn"><i class="fa-solid fa-envelope-circle-check me-2"></i>Sent Reports</button>
        <button class="nav-btn">All Reports</button>

        <h5 class="mb-4">Workflows</h5>
        <button class="nav-btn">
        <i class="fa-solid fa-clock me-2"></i>
        Pending Reviews
          </button>
        <button class="nav-btn">
        <i class="fa-solid fa-user-shield me-2"></i>
        Admin Panel
        </button>
      </div>

      <!-- Main Content -->
      <div class="col-lg-10 p-4">

        <!-- Welcome -->
        <div class="card shadow-sm border-0 rounded-4 p-4 mb-4">
          <h2>Welcome Back</h2>
          <p class="text-muted">
            Manage reports quickly and efficiently.
          </p>
        </div>

        <!-- Stats -->
        <div class="row mb-4">

          <div class="col-md-3 mb-3">
            <div class="card stats-card border-0 rounded-4 p-3">
              <h6>Reports Submitted</h6>
              <h2>24</h2>
            </div>
          </div>

          <div class="col-md-3 mb-3">
            <div class="card stats-card border-0 rounded-4 p-3">
              <h6>Pending Reviews</h6>
              <h2>6</h2>
            </div>
          </div>

          <div class="col-md-3 mb-3">
            <div class="card stats-card border-0 rounded-4 p-3">
              <h6>Approved Reports</h6>
              <h2>18</h2>
            </div>
          </div>

          <div class="col-md-3 mb-3">
            <div class="card stats-card border-0 rounded-4 p-3">
              <h6>Departments</h6>
              <h2>5</h2>
            </div>
          </div>

        </div>

        <!-- Form -->
        <div class="card shadow-sm border-0 rounded-4 p-4">

          <h3 class="mb-3">Submit New Report</h3>

          <form id="reportForm">

            <div class="mb-3">
              <label class="form-label">Report Title</label>
              <input type="text" class="form-control form-control-lg" placeholder="Enter report title">
            </div>

            <div class="row">

              <div class="col-md-6 mb-3">
                <label class="form-label">Team</label>
                <select class="form-select form-select-lg" id="team">
                  <option value="">Select Team</option>
                  <option>ACADEMICS</option>
                  <option>COMPLIANCE</option>
                  <option>CONSULT</option>
                  <option>CONSTRUCT</option>
                  <option>STUDIOS</option>
                  <option>IT (Ozone)</option>
                  <option>TALENT</option>
                  <option>HR & PAYROLL</option>
                  <option>FINANCE</option>
                  <option>FORGE NORTHERN CAMPUS</option>
                </select>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Project Status</label>
                <select class="form-select form-select-lg" id="status">
                  <option value="">Select Status</option>
                  <option>Proposal / Quotation</option>
                  <option>SLA in Progress</option>
                  <option>Planning Phase</option>
                  <option>Project Initiation</option>
                  <option>Implementation / In Progress</option>
                  <option>On Hold</option>
                  <option>Blocked</option>
                  <option>Project Close-Out</option>
                  <option>Completed</option>
                </select>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Date</label>
                <input type="date" class="form-control form-control-lg">
              </div>

            </div>

            <div class="mb-3">
              <label class="form-label">Summary</label>
              <textarea class="form-control" rows="4"></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Challenges</label>
              <textarea class="form-control" rows="3"></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Progress Update</label>
              <textarea class="form-control" rows="3"></textarea>
            </div>

            <div class="mb-4">
              <label class="form-label">Attach File</label>
              <input type="file" class="form-control">
            </div>

            <button id="submitBtn" class="btn btn-warning btn-lg fw-semibold px-5">
              Submit Report
            </button>

          </form>

        </div>

        <!-- Recent Reports Table -->
<div class="card shadow-sm border-0 rounded-4 p-4 mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Recent Reports</h3>

        <input
            type="text"
            id="searchInput"
            class="form-control w-25"
            placeholder="Search reports..."
        >
    </div>

    <div class="table-responsive">
      <input
      type="text"
      id="searchInput"
      class="form-control mb-3"
      placeholder="Search reports...">
        <table class="table table-hover align-middle">

            <thead>
                <tr>
                    <th>Title</th>
                    <th>Team</th>
                    <th>Status</th>
                    <th>Summary</th>
                </tr>
            </thead>

            <tbody id="reportTable">
            </tbody>

        </table>
    </div>

</div>

      </div>
    </div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="script.js"></script>
</body>
</html>
