<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!--Forge Icon-->
    <link rel="icon" type="image/png" href="forge-logo-wht.png">
</head>
<body class="login-body">

<div class="login-container">

    <div class="login-card">

        <div class="text-center mb-4">
            <img src="forge-logo-wht.png" width="100">
            <h2 class="mt-3 text-white">Create Account</h2>
        </div>

        <form id="signupForm">

            <div class="mb-3">
                <input type="text" class="form-control form-control-lg" placeholder="Full Name">
            </div>

            <div class="mb-3">
                <input type="email" class="form-control form-control-lg" placeholder="Email">
            </div>

            <div class="mb-3">
                <input type="password" class="form-control form-control-lg" placeholder="Password">
            </div>

            <button type="submit" class="btn btn-warning w-100 fw-bold mb-3">
                Create Account
            </button>

            <p class="text-center text-white">
                Already have an account?
                <a href="login.html" class="text-warning">Login</a>
            </p>

        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="script.js"></script>    
</body>
</html>
